{% extends 'dashboard/dashboard_base.html' %}
{% block title %}Edit Staff{% endblock %}
{% block content %}
<h2>Edit Staff Member</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <a href="{% url 'marketing_dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
