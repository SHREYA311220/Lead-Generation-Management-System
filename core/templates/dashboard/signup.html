{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Signup with OTP</title>
</head>
<body>
  <h2>Signup</h2>

  {% if error %}
    <p style="color:red">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <input type="text" name="otp" placeholder="OTP" required id="otpField" style="display:none;"><br>
    <button type="button" id="sendOtpBtn">Send OTP</button>
    <button type="submit" style="display:none;" id="submitBtn">Sign Up</button>
  </form>

  <script>
    document.getElementById('sendOtpBtn').onclick = function () {
      const email = document.querySelector('input[name="email"]').value;
      if (!email) { alert("Enter email first"); return; }

      fetch('/send-signup-otp/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: `email=${encodeURIComponent(email)}`
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert("OTP sent to your email!");
          document.getElementById('otpField').style.display = 'block';
          document.getElementById('submitBtn').style.display = 'inline-block';
          document.getElementById('sendOtpBtn').style.display = 'none';
        } else {
          alert("Failed to send OTP: " + data.error);
        }
      });
    };
  </script>
</body>
</html>
