{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Signup | LGTM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --navy: #0F172A;
      --charcoal: #1E293B;
      --emerald: #10B981;
      --gold: #FFD700;
      --white: #fff;
      --gray: #F3F4F6;
      --slate: #1F2937;
      --radius: 1.2rem;
      --transition: 0.18s cubic-bezier(.4,0,.2,1);
    }
    html, body {
    background: var(--navy);
      color: var(--white);
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    
    }
    .signup-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
       background: linear-gradient(135deg, rgb(194, 224, 128) 0%, rgb(230, 128, 112) 30%, rgb(164, 117, 173) 60%, rgb(155, 228, 161) 100%), url('https://www.transparenttextures.com/patterns/marble.png');
    }
    .signup-card {
      background: linear-gradient(120deg, #f7fafc, #e0c3fc, #8ec5fc, #b6e2d3, #ffe082, #f7fafc);

      border-radius: var(--radius);
      box-shadow: 0 8px 32px 0 rgba(16,185,129,0.13);
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1.5px solid rgba(255,255,255,0.09);
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition), background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .signup-card:hover {
      box-shadow: 0 16px 48px 0 rgba(255,215,0,0.18), 0 2px 8px 0 rgba(16,185,129,0.13);
      border-color: var(--gold);
      background: linear-gradient(120deg, #ffe082 0%, #b6e2d3 60%, #e0c3fc 100%);
      transform: translateY(-8px) scale(1.03) rotate(-1deg);
      z-index: 2;
    }
    .signup-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/diamond-upholstery.png') repeat;
      opacity: 0.06;
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .signup-card:hover::before {
      opacity: 0.12;
    }
    .signup-card > * { position: relative; z-index: 2; }
    .signup-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--emerald);
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 16px var(--emerald);
    }
    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .signup-input {
      background: var(--gray);
      border: none;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      font-size: 1.1rem;
      color: var(--slate);
      outline: none;
      transition: box-shadow var(--transition), border-color var(--transition);
      box-shadow: 0 2px 8px 0 rgba(16,185,129,0.08);
    }
    .signup-input:focus {
      border: 1.5px solid var(--emerald);
      box-shadow: 0 4px 16px 0 rgba(16,185,129,0.13);
    }
    .signup-btn {
      background: linear-gradient(90deg, var(--emerald), var(--gold));
      color: var(--charcoal);
      border: none;
      border-radius: 2rem;
      padding: 0.7rem 2.2rem;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 2px 12px 0 rgba(16,185,129,0.10);
      transition: background var(--transition), color var(--transition), transform 0.2s;
    }
    .signup-btn:hover {
      background: linear-gradient(90deg, var(--gold), var(--emerald));
      color: var(--navy);
      transform: scale(1.04);
    }
    .signup-error {
      color: #FFD700;
      background: rgba(255,215,0,0.08);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
    }
    @media (max-width: 576px) {
      .signup-card { padding: 1.2rem 0.5rem; max-width: 98vw; }
      .signup-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-title"><i class="fa-solid fa-user-plus"></i> User Signup</div>
      {% if error %}
        <div class="signup-error">{{ error }}</div>
      {% endif %}
      <!-- <form method="post" class="signup-form">
        {% csrf_token %}
        <input type="text" name="username" class="signup-input" placeholder="Username" required />
        <div class="d-flex align-items-center gap-2">
          <input type="email" name="email" class="signup-input" placeholder="Email" required />
          <button type="button" class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
        </div>
        <input type="password" name="password" class="signup-input" placeholder="Password" required />
        <button type="submit" class="signup-btn w-100 mt-2">Sign Up</button>
      </form> -->
      
      <form method="post" class="signup-form" id="signupForm">
        {% csrf_token %}
        <input type="text" name="username" class="signup-input" placeholder="Username" required />
        <div class="d-flex align-items-center gap-2">
          <input type="email" name="email" id="email" class="signup-input" placeholder="Email" required />
          <button type="button" class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
        </div>
        <div class="mt-2" id="otpSection" style="display: none;">
          <input type="text" name="otp" id="otp" class="signup-input" placeholder="Enter OTP" required />
          <button type="button" class="btn btn-secondary mt-2" onclick="verifyOTP()">Verify OTP</button>
        </div>
        <input type="password" name="password" class="signup-input" placeholder="Password" required />
        <button type="submit" class="signup-btn w-100 mt-2" id="submitBtn" disabled>Sign Up</button>
      </form>
      
      <script>
    function sendOTP() {
    const email = document.getElementById('email').value;
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const formData = new FormData();
    formData.append('email', email);

    fetch('/send-otp/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': csrfToken
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('otpSection').style.display = 'block';
            alert('OTP sent successfully!');
        } else {
            alert('Error sending OTP: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error sending OTP. Please try again.');
    });
}

      
      function verifyOTP() {
          const email = document.getElementById('email').value;
          const otp = document.getElementById('otp').value;
          const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
      
          fetch('/verify-otp/', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'X-CSRFToken': csrfToken
              },
              body: `email=${email}&otp=${otp}`
          })
          .then(response => response.json())
          .then(data => {
              if (data.status === 'success') {
                  document.getElementById('submitBtn').disabled = false;
                  alert('OTP verified successfully!');
              } else {
                  alert('Invalid OTP!');
              }
          });
      }
     
     
     </script>
      <div class="mt-3 text-center">
        <span style="color:#fff;">Already have an account?</span>
        <a href="{% url 'user_login' %}" style="color:var(--emerald); font-weight:600; text-decoration:underline;">Login</a>
      </div>
    </div>
  </div>
  <script>
    // OTP logic (frontend + backend)
    document.getElementById('sendOtpBtn').onclick = function (e) {
  e.preventDefault();
  const email = document.querySelector('input[name="email"]').value;
  if (!email) {
    alert('Please enter your email first.');
    return;
  }

  fetch('/send-email-otp/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
    },
    body: `email=${encodeURIComponent(email)}`
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById('otpInput').style.display = 'block';
      document.getElementById('signupBtn').style.display = 'inline-block';
      document.getElementById('sendOtpBtn').style.display = 'none';
      alert('OTP sent to your email!');
    } else {
      alert('Failed to send OTP: ' + (data.error || 'Unknown error.'));
    }
  })
  .catch(err => {
    alert('Error sending OTP: ' + err.message);
  });
};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
