<h2>All Leads</h2>
<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Created At</th>
  </tr>
  {% for lead in leads %}
  <tr>
    <td>{{ lead.name }}</td>
    <td>{{ lead.email }}</td>
    <td>{{ lead.phone }}</td>
    <td>{{ lead.created_at }}</td>
  </tr>
  {% endfor %}
</table>
