{% extends 'dashboard/dashboard_base.html' %}

{% block title %}Add Staff{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Add Staff</h2>
  <form method="post"  action="{% url 'add_staff' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Add Staff</button>
  </form>
</div>
{% endblock %}
