{% extends 'dashboard/dashboard_base.html' %}
{% block title %}Delete Staff{% endblock %}
{% block content %}
<h2>Delete Staff Member</h2>
<p>Are you sure you want to delete <strong>{{ staff.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'marketing_dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
