
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | LGTM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --navy: #0F172A;
      --charcoal: #1E293B;
      --emerald: #10B981;
      --gold: #FFD700;
      --white: #fff;
      --gray: #F3F4F6;
      --slate: #1F2937;
      --radius: 1.2rem;
      --transition: 0.18s cubic-bezier(.4,0,.2,1);
    }
    html, body 
       {
      /* Marble mix color background */
      min-height: 100vh;
      background: linear-gradient(135deg, rgb(194, 224, 128) 0%, rgb(230, 128, 112) 30%, rgb(164, 117, 173) 60%, rgb(155, 228, 161) 100%), url('https://www.transparenttextures.com/patterns/marble.png');
      background-blend-mode: lighten;
      background-size: cover, 340px 340px;
      color: var(--white);
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      color: var(--white);
      min-height: 100vh;
    }
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgb(194, 224, 128) 0%, rgb(230, 128, 112) 30%, rgb(164, 117, 173) 60%, rgb(155, 228, 161) 100%), url('https://www.transparenttextures.com/patterns/marble.png');
;
    }
    .login-card {
      background: linear-gradient(135deg, #f7fafc 0%, #e0c3fc 50%, #8ec5fc 100%);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px 0 rgba(164, 117, 173, 0.10);
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 370px;
      text-align: center;
      border: 1.5px solid #e0c3fc;
      transition: box-shadow 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1), background 1.2s;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(120deg, #f7fafc, #e0c3fc, #8ec5fc, #b6e2d3, #ffe082, #f7fafc);
      background-size: 400% 400%;
      opacity: 0.22;
      filter: blur(12px);
      transition: opacity 1.2s, filter 1.2s;
      pointer-events: none;
      animation: cardGradientMoveSoft 12s ease-in-out infinite;
    }
    @keyframes cardGradientMoveSoft {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .login-card:hover {
      box-shadow: 0 16px 48px 0 rgba(164, 117, 173, 0.18), 0 2px 8px 0 rgba(16,185,129,0.10);
      transform: translateY(-8px) scale(1.03) rotateY(3deg) skewY(-1deg);
      background: linear-gradient(120deg, #ffe082 0%, #b6e2d3 60%, #e0c3fc 100%);
    }
    .login-card:hover::before {
      opacity: 0.32;
      filter: blur(6px);
    }
    .login-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--emerald);
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 16px var(--emerald);
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .login-input {
      background: var(--gray);
      border: none;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      font-size: 1.1rem;
      color: var(--slate);
      outline: none;
      transition: box-shadow var(--transition), border-color var(--transition);
      box-shadow: 0 2px 8px 0 rgba(16,185,129,0.08);
    }
    .login-input:focus {
      border: 1.5px solid var(--emerald);
      box-shadow: 0 4px 16px 0 rgba(16,185,129,0.13);
    }
    .login-btn {
      background: linear-gradient(90deg, var(--emerald), var(--gold));
      color: var(--charcoal);
      border: none;
      border-radius: 2rem;
      padding: 0.7rem 2.2rem;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 2px 12px 0 rgba(16,185,129,0.10);
      transition: background var(--transition), color var(--transition), transform 0.2s;
    }
    .login-btn:hover {
      background: linear-gradient(90deg, var(--gold), var(--emerald));
      color: var(--navy);
      transform: scale(1.04);
    }
    .login-error {
      color: #FFD700;
      background: rgba(255,215,0,0.08);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
    }
    @media (max-width: 576px) {
      .login-card { padding: 1.2rem 0.5rem; max-width: 98vw; }
      .login-title { font-size: 1.3rem; }
    }
    /* Global Text Selection Color */
    ::selection {
      background: #FFD700;
      color:rgb(0, 3, 8);
    }
    html ::-moz-selection, body ::-moz-selection {
      background: #FFD700;
      color: #1E293B;
    }
    .navbar .navbar-brand,
    .navbar .nav-link {
      color: #111 !important;
    }
    .navbar .nav-link:focus,
    .navbar .nav-link:hover,
    .navbar .nav-link.active {
      color:rgb(7, 7, 7) !important;
      background: rgb(238, 93, 93);
      transition: color 0.5s cubic-bezier(.4,0,.2,1), background 0.7s cubic-bezier(.4,0,.2,1), box-shadow 0.6s cubic-bezier(.4,0,.2,1), transform 0.6s cubic-bezier(.4,0,.2,1);
    }
     .navbar .nav-link:hover, .navbar .nav-link:focus {
      color:rgb(7, 7, 7) !important;
      background: rgb(238, 93, 93);
      transition: color 0.5s cubic-bezier(.4,0,.2,1), background 0.7s cubic-bezier(.4,0,.2,1), box-shadow 0.6s cubic-bezier(.4,0,.2,1), transform 0.6s cubic-bezier(.4,0,.2,1);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background:rgb(240, 136, 56); box-shadow: 0 2px 12px 0 rgba(16,185,129,0.04); border-bottom: 1.5px solid rgba(255,255,255,0.04);">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'home' %}" style="color:black; font-weight: 700; letter-spacing: 1px; font-size: 1.4rem;">LGTM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
       <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Home</a></li>

        </ul>
      </div> 
    </div>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <div class="login-title"><i class="fa-solid fa-user"></i> User Login</div>
      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}
      <form method="post" class="login-form">
        {% csrf_token %}
        <input type="text" name="username" class="login-input" placeholder="Username or Email" required autofocus />
        <input type="password" name="password" class="login-input" placeholder="Password" required />
        <button type="submit" class="login-btn">Login</button>
      </form>
      <div class="mt-3 text-center">
        <span style="color:black;">Don't have an account?</span>
        <a href="{% url 'user_signup' %}" style="color:red; font-weight:600; text-decoration:underline;">Sign Up</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
